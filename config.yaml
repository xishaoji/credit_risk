# 项目配置文件
paths:
  data_dir: "data"
  output_dir: "outputs"
  model_dir: "models"
  log_dir: "logs"

data:
  kaggle_filename: "cs-training.csv"
  synthetic_samples: 5000
  random_state: 42

training:
  test_size: 0.2
  cv_n_splits: 5
  smote_random_state: 42
  use_hyperparameter_tuning: true
  tuning_trials: 30

models:
  logistic_regression:
    max_iter: 1000
  random_forest:
    n_estimators: 200
    max_depth: 10
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    eval_metric: "logloss"
  lightgbm:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    verbose: -1
